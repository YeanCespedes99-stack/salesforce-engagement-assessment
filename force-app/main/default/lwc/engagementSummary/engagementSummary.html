<template>
    <lightning-card title="Engagement Summary" icon-name="standard:opportunity">
        <div class="slds-p-around_medium">
            <p><strong>Opportunity Amount:</strong> {opportunityAmount}</p>
            <p><strong>Completed Tasks:</strong> {completedTasks}</p>
            <p><strong>Upcoming Events:</strong> {upcomingEvents}</p>
            <br/>
            <lightning-button
                variant="brand"
                label="Quick Follow-Up Call"
                onclick={createCall}>
            </lightning-button>
        </div>
    </lightning-card>
</template>
